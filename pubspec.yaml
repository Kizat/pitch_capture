name: pitch_capture
description: this package intended for capture pitch
version: 0.0.3

environment:
  sdk: ^3.7.2
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: kz.kishonization.capture
        pluginClass: CapturePlugin
      ios:
        pluginClass: SwiftFlutterAudioCapturePlugin
